upstreams:
  -
    id: httpbin
    type: roundrobin
    nodes:
      "httpbin.org": 1

routes:
  - uri: /headers
    upstream_id: httpbin

  - id: resty-http
    uri: /resty-http
    plugins:
      proxy-rewrite:
        regex_uri:
          - "^/resty-http$"
          - "/headers"
      resty-http:
        uri: http://host.docker.internal:8080/client
    upstream_id: httpbin

  - id: resty-jwt
    uri: /resty-jwt
    plugins:
      proxy-rewrite:
        regex_uri:
          - "^/resty-jwt$"
          - "/headers"
      resty-jwt:
        signed_key: "signed-key"
    upstream_id: httpbin

  - id: resty-openssl
    uri: /resty-openssl
    plugins:
      proxy-rewrite:
        regex_uri:
          - "^/resty-openssl$"
          - "/headers"
      resty-openssl:
        pkey: "-----BEGIN PRIVATE KEY-----\\n-----END PRIVATE KEY-----"
    upstream_id: httpbin
#END
